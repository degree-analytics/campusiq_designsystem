name: Validate vanilla dist

on:
  push:
    paths:
      - 'src/index.css'
      - 'src/vanilla/**'
      - 'scripts/build-vanilla.mjs'
  pull_request:
    paths:
      - 'src/index.css'
      - 'src/vanilla/**'
      - 'scripts/build-vanilla.mjs'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build vanilla dist
        run: node scripts/build-vanilla.mjs

      - name: Check dist/ is up to date
        run: |
          if ! git diff --quiet dist/; then
            echo "::error::dist/ files are out of date. Run 'node scripts/build-vanilla.mjs' and commit the results."
            git diff dist/
            exit 1
          fi
